services:
  - type: web
    runtime: static
    name: sqez-site
    buildCommand: echo "Static site ready"
    staticPublishPath: .

  - type: web
    runtime: node
    name: sqez-api
    plan: free
    region: oregon
    rootDir: sqez-backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: sqez-postgres
          property: connectionString

databases:
  - name: sqez-postgres
    plan: free
    region: oregon
    databaseName: sqez
